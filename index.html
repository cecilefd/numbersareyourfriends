<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numberly — Daily Math Drills</title>
<style>
  /* ---- Blue/purple hippy-nerd palette ---- */
  :root {
    --bg: #e8e3f3;
    --paper: #f5f1fb;
    --primary: #6b4fb8;
    --primary-light: #9f86d8;
    --accent: #5b7db8;
    --teal: #4a7b9a;
    --lavender: #c4b5e0;
    --ink: #1e1747;
    --correct: #5d8e8e;
    --wrong: #b86680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(107,79,184,0.18) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(74,123,154,0.20) 0%, transparent 50%);
  }
  .app {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 24px;
    padding: 32px;
    max-width: 580px; width: 100%;
    box-shadow: 8px 8px 0 var(--ink);
    position: relative;
    margin-top: 30px;
  }
  .app::before, .app::after {
    position: absolute;
    width: 40px; height: 40px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 20px;
  }
  .app::before { content: "π"; top: -20px; left: 28px; background: var(--lavender); color: var(--ink); }
  .app::after  { content: "∑"; bottom: -20px; right: 28px; background: var(--teal); color: white; }

  h1 {
    font-size: 36px;
    color: var(--primary);
    letter-spacing: -1px;
  }
  .tagline {
    font-style: italic; color: var(--accent);
    margin-bottom: 24px; font-size: 14px;
  }

  .stats {
    display: flex; gap: 12px;
    padding: 14px;
    background: var(--bg);
    border-radius: 12px;
    border: 2px dashed var(--ink);
    margin-bottom: 20px;
  }
  .stat { flex: 1; text-align: center; }
  .stat-value { font-size: 26px; font-weight: bold; color: var(--primary); }
  .stat-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--accent);
  }

  button {
    background: var(--primary-light);
    color: white;
    border: 3px solid var(--ink);
    border-radius: 16px;
    padding: 14px 28px;
    font-size: 18px; font-weight: bold;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.08s, box-shadow 0.08s;
  }
  button:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  button:active { transform: translate(2px,2px);  box-shadow: 2px 2px 0 var(--ink); }
  .btn-primary {
    background: var(--primary); color: white;
    display: block; width: 100%;
    font-size: 20px; padding: 18px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .progress-bar {
    background: var(--bg);
    border: 2px solid var(--ink);
    border-radius: 20px;
    height: 14px; overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    background: var(--primary-light);
    height: 100%;
    transition: width 0.3s;
  }

  .question-prompt {
    font-size: 38px; font-weight: bold;
    text-align: center;
    padding: 36px 20px;
    background: var(--bg);
    border-radius: 16px;
    border: 2px solid var(--ink);
    margin-bottom: 20px;
    color: var(--ink);
  }

  /* Answer input — using type="text" + inputmode="decimal"
     to avoid the number-spinner "−/×" UI some browsers add. */
  .answer-input {
    width: 100%;
    font-size: 32px;
    padding: 16px;
    text-align: center;
    border: 3px solid var(--ink);
    border-radius: 12px;
    background: white;
    font-family: inherit; font-weight: bold;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .answer-input:focus { outline: none; background: #faf6ff; }

  .feedback {
    padding: 14px; border-radius: 12px;
    margin-bottom: 16px;
    font-weight: bold; text-align: center;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--correct); color: white; }
  .feedback.wrong { background: var(--wrong); color: white; }

  .summary-list { list-style: none; margin: 12px 0; }
  .summary-list li {
    padding: 12px 14px;
    margin-bottom: 10px;
    background: var(--bg);
    border-radius: 8px;
    border-left: 4px solid var(--wrong);
    font-size: 14px;
  }
  .summary-list .expl {
    margin-top: 6px;
    font-size: 13px;
    color: var(--primary);
    font-style: italic;
    line-height: 1.4;
  }
  h2 { color: var(--teal); margin-bottom: 12px; }
  h3 { margin-top: 20px; margin-bottom: 8px; color: var(--ink); }
  .home-msg { margin-bottom: 20px; line-height: 1.6; }

  /* ---- Multiplication table question ---- */
  .table-title {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    color: var(--primary);
    margin-bottom: 14px;
    padding: 10px;
    background: var(--bg);
    border-radius: 10px;
    border: 2px solid var(--ink);
  }
  .table-rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 20px;
  }
  .table-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: white;
    border: 2px solid var(--lavender);
    border-radius: 8px;
    font-size: 16px;
  }
  .table-row.blank {
    border-color: var(--primary);
    background: #faf6ff;
    box-shadow: inset 0 0 0 1px var(--primary-light);
  }
  .table-expr { font-weight: bold; text-align: right; color: var(--ink); }
  .table-eq   { color: var(--accent); font-weight: bold; }
  .table-val  { font-weight: bold; color: var(--primary); }
  .blank-input {
    font-size: 16px;
    font-weight: bold;
    width: 100%;
    padding: 6px 8px;
    border: 2px solid var(--primary);
    border-radius: 6px;
    text-align: center;
    font-family: inherit;
    background: white;
    color: var(--primary);
  }
  .blank-input:focus { outline: none; background: #fff; box-shadow: 0 0 0 2px var(--primary-light); }
  @media (max-width: 500px) {
    .table-rows { grid-template-columns: 1fr; }
  }

  /* ---- Floating calculator ---- */
  #calc-toggle {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 58px; height: 58px;
    border-radius: 50%;
    padding: 0;
    font-size: 26px;
    background: var(--accent);
    z-index: 100;
  }
  #calculator {
    position: fixed;
    bottom: 94px; right: 24px;
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 6px 6px 0 var(--ink);
    width: 272px;
    display: none;
    z-index: 99;
  }
  #calculator.visible { display: block; }
  #calc-display {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: right;
    font-size: 22px;
    font-family: 'Courier New', monospace;
    margin-bottom: 10px;
    min-height: 46px;
    color: var(--ink);
    word-break: break-all;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .calc-grid button {
    padding: 12px 0;
    font-size: 17px;
    box-shadow: 2px 2px 0 var(--ink);
    border-width: 2px;
    border-radius: 10px;
    background: var(--lavender);
    color: var(--ink);
  }
  .calc-grid .calc-op { background: var(--primary-light); color: white; }
  .calc-grid .calc-eq { background: var(--primary); color: white; }
</style>
</head>
<body>
<div class="app">
  <h1>Numberly</h1>
  <p class="tagline">~ one small daily drill ~</p>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="streak">0</div><div class="stat-label">🔥 Streak</div></div>
    <div class="stat"><div class="stat-value" id="xp">0</div><div class="stat-label">✦ XP</div></div>
    <div class="stat"><div class="stat-value" id="best">0</div><div class="stat-label">☆ Best</div></div>
  </div>

  <div class="screen active" id="home">
    <p class="home-msg" id="home-msg"></p>
    <button class="btn-primary" onclick="startSession()">Start today's session</button>
  </div>

  <div class="screen" id="quiz">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div id="question-area"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-primary" onclick="submitAnswer()">Submit</button>
  </div>

  <div class="screen" id="summary">
    <h2>Session complete ✨</h2>
    <div class="stats">
      <div class="stat"><div class="stat-value" id="summary-score">0/20</div><div class="stat-label">Score</div></div>
      <div class="stat"><div class="stat-value" id="summary-xp">+0</div><div class="stat-label">XP earned</div></div>
    </div>
    <div id="mistakes-review"></div>
    <button class="btn-primary" onclick="goHome()" style="margin-top: 20px;">Done</button>
  </div>
</div>

<!-- Floating calculator -->
<button id="calc-toggle" onclick="toggleCalc()" title="Show/hide calculator">🧮</button>
<div id="calculator">
  <div id="calc-display">0</div>
  <div class="calc-grid">
    <button onclick="calcPress('C')">C</button>
    <button onclick="calcPress('⌫')">⌫</button>
    <button class="calc-op" onclick="calcPress('%')">%</button>
    <button class="calc-op" onclick="calcPress('÷')">÷</button>
    <button onclick="calcPress('7')">7</button>
    <button onclick="calcPress('8')">8</button>
    <button onclick="calcPress('9')">9</button>
    <button class="calc-op" onclick="calcPress('×')">×</button>
    <button onclick="calcPress('4')">4</button>
    <button onclick="calcPress('5')">5</button>
    <button onclick="calcPress('6')">6</button>
    <button class="calc-op" onclick="calcPress('-')">−</button>
    <button onclick="calcPress('1')">1</button>
    <button onclick="calcPress('2')">2</button>
    <button onclick="calcPress('3')">3</button>
    <button class="calc-op" onclick="calcPress('+')">+</button>
    <button onclick="calcPress('0')" style="grid-column: span 2;">0</button>
    <button onclick="calcPress('.')">.</button>
    <button class="calc-eq" onclick="calcPress('=')">=</button>
  </div>
</div>

<script>
// ================================================================
// NUMBERLY v2
// ================================================================
const SESSION_LENGTH = 20;

// ---- STORAGE ---------------------------------------------------
function loadState() {
  const raw = localStorage.getItem('numberly');
  if (!raw) return { streak: 0, bestStreak: 0, xp: 0, lastPlayed: null };
  return JSON.parse(raw);
}
function saveState(s) { localStorage.setItem('numberly', JSON.stringify(s)); }

// ---- HELPERS ---------------------------------------------------
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr)         { return arr[randInt(0, arr.length - 1)]; }

// ---- QUESTION GENERATORS ---------------------------------------
// Every generator returns one of:
//   { type: 'single', prompt, answer, explanation }
//   { type: 'table',  n, blanks: [pos,...], answers: [val,...], explanation }
// All answers are integers — we never produce ugly decimals.

function multiplicationQuestion() {
  const useTwoDigit = Math.random() < 0.4;
  let a, b;
  if (useTwoDigit) {
    a = randInt(11, 99);
    b = randInt(2, 9);
  } else {
    a = randInt(2, 12);
    b = randInt(2, 12);
  }
  const answer = a * b;
  let expl;
  if (useTwoDigit) {
    const tens = Math.floor(a / 10) * 10;
    const ones = a - tens;
    expl = `Break ${a} into ${tens} + ${ones}: (${tens}×${b}) + (${ones}×${b}) = ${tens*b} + ${ones*b} = ${answer}`;
  } else {
    expl = `${a} × ${b} = ${answer}`;
  }
  return { type: 'single', prompt: `${a} × ${b}`, answer, explanation: expl };
}

// -- Percentages (three flavors, all integer answers) --

function pctOfFlavor() {
  // "X% of Y"
  const pcts = [5, 10, 15, 20, 25, 30, 40, 50, 60, 75, 80, 90];
  for (let i = 0; i < 50; i++) {
    const x = pick(pcts);
    const y = randInt(2, 30) * 10;
    const answer = x * y / 100;
    if (Number.isInteger(answer) && answer > 0 && answer < 500) {
      let expl;
      if (x === 10)      expl = `10% means divide by 10. ${y} ÷ 10 = ${answer}.`;
      else if (x === 50) expl = `50% = half. ${y} ÷ 2 = ${answer}.`;
      else if (x === 25) expl = `25% = a quarter. ${y} ÷ 4 = ${answer}.`;
      else if (x === 75) expl = `75% = three quarters. (${y} ÷ 4) × 3 = ${y/4} × 3 = ${answer}.`;
      else if (x === 20) expl = `20% = one fifth. ${y} ÷ 5 = ${answer}.`;
      else if (x === 5)  expl = `5% = half of 10%. 10% of ${y} = ${y/10}, so 5% = ${answer}.`;
      else if (x === 15) expl = `15% = 10% + 5%. 10% of ${y} = ${y/10}, 5% = ${y/20}, total = ${answer}.`;
      else               expl = `${x}% of ${y} = (${x} × ${y}) ÷ 100 = ${x*y} ÷ 100 = ${answer}.`;
      return { type: 'single', prompt: `${x}% of ${y}`, answer, explanation: expl };
    }
  }
  return { type: 'single', prompt: `10% of 50`, answer: 5, explanation: `10% = divide by 10. 50 ÷ 10 = 5.` };
}

function pctOfWhatFlavor() {
  // "Y is what % of Z?"
  const pcts = [5, 10, 20, 25, 30, 40, 50, 60, 75];
  for (let i = 0; i < 50; i++) {
    const x = pick(pcts);
    const z = randInt(2, 20) * 10;
    const y = x * z / 100;
    if (Number.isInteger(y) && y > 0 && y < z) {
      const expl = `Divide ${y} by ${z}, then × 100. ${y} ÷ ${z} = ${(y/z).toFixed(2)}, which is ${x}%.`;
      return { type: 'single', prompt: `${y} is what % of ${z}?`, answer: x, explanation: expl };
    }
  }
  return { type: 'single', prompt: `5 is what % of 20?`, answer: 25, explanation: `5 ÷ 20 = 0.25 = 25%.` };
}

function pctChangeFlavor() {
  // "Y increased/decreased by X%"
  const pcts = [5, 10, 20, 25, 30, 40, 50, 75];
  for (let i = 0; i < 50; i++) {
    const isIncrease = Math.random() > 0.5;
    const x = pick(pcts);
    const y = randInt(2, 20) * 10;
    const delta = x * y / 100;
    const answer = isIncrease ? y + delta : y - delta;
    if (Number.isInteger(delta) && Number.isInteger(answer) && answer > 0) {
      const expl = isIncrease
        ? `${x}% of ${y} = ${delta}. Then ${y} + ${delta} = ${answer}.`
        : `${x}% of ${y} = ${delta}. Then ${y} − ${delta} = ${answer}.`;
      const prompt = isIncrease ? `${y} increased by ${x}%` : `${y} decreased by ${x}%`;
      return { type: 'single', prompt, answer, explanation: expl };
    }
  }
  return { type: 'single', prompt: `100 increased by 10%`, answer: 110, explanation: `10% of 100 = 10. 100 + 10 = 110.` };
}

function percentageQuestion() {
  const r = Math.random();
  if (r < 0.4) return pctOfFlavor();
  if (r < 0.75) return pctOfWhatFlavor();
  return pctChangeFlavor();
}

function tableQuestion() {
  // Full times table for N, with 2 rows blanked out.
  const n = randInt(2, 12);
  const positions = [];
  while (positions.length < 2) {
    const p = randInt(2, 12);   // never blank the ×1 row — it anchors the table
    if (!positions.includes(p)) positions.push(p);
  }
  positions.sort((a, b) => a - b);
  return {
    type: 'table',
    n,
    blanks: positions,
    answers: positions.map(p => n * p),
    explanation: positions.map(p => `${n} × ${p} = ${n*p}`).join('  ·  ')
  };
}

const GENERATORS = [
  { name: 'multiplication', gen: multiplicationQuestion, weight: 0.40 },
  { name: 'percentage',     gen: percentageQuestion,     weight: 0.40 },
  { name: 'table',          gen: tableQuestion,          weight: 0.20 },
];

function pickGenerator() {
  const r = Math.random();
  let cum = 0;
  for (const g of GENERATORS) {
    cum += g.weight;
    if (r <= cum) return g.gen;
  }
  return GENERATORS[0].gen;
}

// ---- SESSION ---------------------------------------------------
let session = null;

function startSession() {
  session = {
    questions: Array.from({ length: SESSION_LENGTH }, () => pickGenerator()()),
    index: 0,
    correct: 0,
    mistakes: [],
    locked: false,
  };
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = session.questions[session.index];
  document.getElementById('progress').style.width =
    `${(session.index / SESSION_LENGTH) * 100}%`;
  const fb = document.getElementById('feedback');
  fb.classList.remove('show', 'correct', 'wrong');
  fb.textContent = '';
  session.locked = false;
  const area = document.getElementById('question-area');
  if (q.type === 'table') {
    area.innerHTML = renderTable(q);
    const firstBlank = area.querySelector('.blank-input');
    if (firstBlank) setTimeout(() => firstBlank.focus(), 50);
  } else {
    area.innerHTML =
      `<div class="question-prompt">${q.prompt}</div>` +
      `<input type="text" inputmode="decimal" class="answer-input" id="answer" placeholder="?" autocomplete="off">`;
    const input = document.getElementById('answer');
    setTimeout(() => input.focus(), 50);
  }
}

function renderTable(q) {
  let html = `<div class="table-title">The ${q.n}× table — fill the blanks</div><div class="table-rows">`;
  for (let i = 1; i <= 12; i++) {
    const blankIdx = q.blanks.indexOf(i);
    if (blankIdx !== -1) {
      html +=
        `<div class="table-row blank">` +
          `<span class="table-expr">${q.n} × ${i}</span>` +
          `<span class="table-eq">=</span>` +
          `<input type="text" inputmode="decimal" class="blank-input" data-blank-index="${blankIdx}" placeholder="?" autocomplete="off">` +
        `</div>`;
    } else {
      html +=
        `<div class="table-row">` +
          `<span class="table-expr">${q.n} × ${i}</span>` +
          `<span class="table-eq">=</span>` +
          `<span class="table-val">${q.n * i}</span>` +
        `</div>`;
    }
  }
  html += `</div>`;
  return html;
}

function submitAnswer() {
  if (!session || session.locked) return;
  const q = session.questions[session.index];
  let correct = false;

  if (q.type === 'table') {
    const inputs = Array.from(document.querySelectorAll('.blank-input'));
    const given = inputs.map(i => parseFloat(i.value));
    if (given.some(g => isNaN(g))) return;
    session.locked = true;
    correct = given.every((g, idx) => Math.abs(g - q.answers[idx]) < 0.001);
    q.blanks.forEach((pos, idx) => {
      if (Math.abs(given[idx] - q.answers[idx]) >= 0.001) {
        session.mistakes.push({
          prompt: `${q.n} × ${pos}`,
          answer: q.answers[idx],
          given: given[idx],
          explanation: `${q.n} × ${pos} = ${q.answers[idx]}.`
        });
      }
    });
  } else {
    const input = document.getElementById('answer');
    const given = parseFloat(input.value);
    if (isNaN(given)) return;
    session.locked = true;
    correct = Math.abs(given - q.answer) < 0.001;
    if (!correct) {
      session.mistakes.push({
        prompt: q.prompt,
        answer: q.answer,
        given,
        explanation: q.explanation
      });
    }
  }

  if (correct) session.correct += 1;
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (correct) {
    fb.classList.add('correct');
    fb.textContent = 'Correct! ✓';
  } else {
    fb.classList.add('wrong');
    fb.textContent = q.type === 'table'
      ? `Answers: ${q.answers.join(', ')}`
      : `Answer: ${q.answer}`;
  }

  setTimeout(() => {
    session.index += 1;
    if (session.index >= SESSION_LENGTH) endSession();
    else renderQuestion();
  }, 1500);
}

function endSession() {
  const state = loadState();
  const today = new Date().toDateString();
  if (state.lastPlayed !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    state.streak = (state.lastPlayed === yesterday) ? state.streak + 1 : 1;
    state.bestStreak = Math.max(state.bestStreak, state.streak);
    state.lastPlayed = today;
  }
  const earnedXp = session.correct * 5;
  state.xp += earnedXp;
  saveState(state);
  document.getElementById('summary-score').textContent = `${session.correct}/${SESSION_LENGTH}`;
  document.getElementById('summary-xp').textContent = `+${earnedXp}`;
  const mistakesDiv = document.getElementById('mistakes-review');
  if (session.mistakes.length === 0) {
    mistakesDiv.innerHTML = '<p style="margin-top:16px;color:var(--correct);font-style:italic;font-weight:bold;">Perfect round — no mistakes! 🌟</p>';
  } else {
    const items = session.mistakes.slice(0, 10).map(m =>
      `<li><strong>${m.prompt}</strong> = <strong>${m.answer}</strong> <em>(you said ${m.given})</em><div class="expl">↳ ${m.explanation}</div></li>`
    ).join('');
    mistakesDiv.innerHTML = `<h3>Review:</h3><ul class="summary-list">${items}</ul>`;
  }
  refreshStats();
  showScreen('summary');
}

function goHome() { showScreen('home'); refreshHomeMessage(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function refreshStats() {
  const s = loadState();
  document.getElementById('streak').textContent = s.streak;
  document.getElementById('xp').textContent = s.xp;
  document.getElementById('best').textContent = s.bestStreak;
}

function refreshHomeMessage() {
  const s = loadState();
  const today = new Date().toDateString();
  const msg = document.getElementById('home-msg');
  if (s.lastPlayed === today) {
    msg.textContent = `Nice — you've already practiced today. Come back tomorrow to keep your streak, or do another round for extra XP.`;
  } else if (s.streak > 0) {
    msg.textContent = `You're on a ${s.streak}-day streak. Don't break the chain!`;
  } else {
    msg.textContent = `Welcome. Start a daily practice and watch your streak grow.`;
  }
}

// Enter key: advances between blanks if there are empty ones,
// otherwise submits. Works for both single-input and table questions.
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  if (!document.getElementById('quiz').classList.contains('active')) return;
  const t = e.target;
  if (t.tagName !== 'INPUT') return;
  if (t.classList.contains('blank-input')) {
    const blanks = Array.from(document.querySelectorAll('.blank-input'));
    const nextEmpty = blanks.find(b => b !== t && !b.value);
    if (nextEmpty) { nextEmpty.focus(); e.preventDefault(); return; }
  }
  submitAnswer();
  e.preventDefault();
});

// ---- CALCULATOR ------------------------------------------------
let calcExpr = '';
function toggleCalc() {
  document.getElementById('calculator').classList.toggle('visible');
}
function calcPress(key) {
  const display = document.getElementById('calc-display');
  if (key === 'C') { calcExpr = ''; display.textContent = '0'; return; }
  if (key === '⌫') {
    calcExpr = calcExpr.slice(0, -1);
    display.textContent = calcExpr || '0';
    return;
  }
  if (key === '=') {
    try {
      const cleaned = calcExpr.replace(/×/g, '*').replace(/÷/g, '/');
      const result = Function('"use strict"; return (' + cleaned + ')')();
      if (!isFinite(result)) throw new Error('bad');
      const rounded = Math.round(result * 10000) / 10000;
      display.textContent = String(rounded);
      calcExpr = String(rounded);
    } catch (err) {
      display.textContent = 'error';
      calcExpr = '';
    }
    return;
  }
  if (key === '%') {
    // Converts the current expression into "x / 100" so you can chain it:
    //   50 % × 80 → 0.5 × 80 → 40
    calcExpr += '/100';
    display.textContent = calcExpr;
    return;
  }
  calcExpr += key;
  display.textContent = calcExpr;
}

// Boot
refreshStats();
refreshHomeMessage();
</script>
